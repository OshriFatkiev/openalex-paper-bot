# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# `pre-commit autoupdate` to bump up rev tags to the latest stable releases

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: debug-statements  # Check for debugger imports and breakpoints
      - id: check-ast  # Validate Python syntax

  # Ruff via the local uv-managed dependency
  - repo: local
    hooks:
      # Run the linter
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
      # Run the formatter
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
